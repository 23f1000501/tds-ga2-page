name: Cache Assignment

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  cache-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create dummy dependency
        run: |
          mkdir -p my_deps
          echo "This is a cached file" > my_deps/data.txt

      - name: Cache dependencies
        id: cache-step
        uses: actions/cache@v4
        with:
          path: my_deps
          key: cache-baec099

      # THIS IS THE STEP THE VALIDATOR IS LOOKING FOR
      - name: prime-cache-baec099
        run: echo "Cache hit result is ${{ steps.cache-step.outputs.cache-hit }}"

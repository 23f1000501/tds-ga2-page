name: Cache Assignment

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  cache-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # This creates a dummy file to 'cache'
      - name: Create dummy dependency
        run: |
          mkdir -p my_deps
          echo "This is a cached file" > my_deps/data.txt

      - name: Cache dependencies
        id: cache-step
        uses: actions/cache@v4
        with:
          path: my_deps
          key: cache-baec099

      # Requirement: Step named prime-cache-baec099 that echoes result
      - name: prime-cache-baec099
        run: |
          echo "Cache hit: ${{ steps.cache-step.outputs.cache-hit }}"
          if [ "${{ steps.cache-step.outputs.cache-hit }}" == "true" ]; then
            echo "Result: Cache was found and restored."
          else
            echo "Result: Cache miss. This run will prime the cache for the next one."
          fi
